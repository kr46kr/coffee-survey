<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaBrew Quiz Style Preview — Bold</title>
    <style>
      :root {
        --bg: #17110f;
        --panel: rgba(37, 24, 19, 0.92);
        --text: #f8efe4;
        --muted: #d2bda8;
        --accent: #d7a35d;
        --accent-2: #f3d7ae;
        --border: rgba(243, 215, 174, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 20%, rgba(215, 163, 93, 0.14), transparent 30%),
          radial-gradient(circle at 80% 0%, rgba(243, 215, 174, 0.08), transparent 26%),
          linear-gradient(160deg, #120d0b, var(--bg));
        display: grid;
        place-items: center;
        padding: 32px 20px;
      }

      .shell {
        width: min(760px, 100%);
        border: 1px solid var(--border);
        border-radius: 30px;
        background: var(--panel);
        box-shadow: 0 32px 80px rgba(0, 0, 0, 0.45);
        padding: 40px;
        position: relative;
        overflow: hidden;
      }

      .shell::after {
        content: "";
        position: absolute;
        inset: auto -10% -20% 40%;
        height: 240px;
        background: radial-gradient(circle, rgba(215, 163, 93, 0.18), transparent 65%);
        pointer-events: none;
      }

      .topline {
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 12px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(34px, 5vw, 56px);
        line-height: 0.98;
        max-width: 10ch;
      }

      p {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.5;
        max-width: 44ch;
      }

      .answers {
        display: grid;
        gap: 14px;
      }

      button {
        position: relative;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.08));
        color: var(--text);
        text-align: left;
        padding: 18px 22px;
        border-radius: 18px;
        font-size: 17px;
        cursor: pointer;
        transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      }

      button:hover {
        transform: translateY(-2px);
        border-color: rgba(243, 215, 174, 0.34);
        background: linear-gradient(180deg, rgba(243, 215, 174, 0.08), rgba(0, 0, 0, 0.1));
      }

      .note {
        margin-top: 22px;
        color: var(--accent-2);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="topline">
        <span>NovaBrew Quiz</span>
        <span>Question 3 / 7</span>
      </div>
      <h1>How do you want your coffee to show up for you?</h1>
      <p>
        Think less about technical taste notes and more about the kind of energy
        you want your cup to bring into the room.
      </p>
      <section class="answers">
        <button>Make it bold, decisive, and impossible to ignore</button>
        <button>Make it polished, balanced, and quietly impressive</button>
        <button>Make it soft, familiar, and comforting every time</button>
        <button>Make it surprising, unusual, and a little unpredictable</button>
      </section>
      <div class="note">Bold / premium / high-contrast</div>
    </main>
  </body>
</html>
